Définition opérationnelle :
Une situation-problème est une tâche complexe dans laquelle la solution ne peut pas être obtenue par l’application directe d’une procédure connue. Elle exige une construction progressive de la solution, fondée sur une démarche où chaque étape dépend réellement des précédentes.

- Effet structurant des choix : L’élève doit faire des choix ayant un impact direct sur la suite.
- Construction progressive : La solution finale émerge graduellement (ajustements, validations).
- Possibilité d'erreurs : La situation doit permettre plusieurs démarches, des fausses pistes plausibles, et révéler des erreurs conceptuelles/procédurales.

                        const sousCategories = [...new Set(conceptsDeCategorie.map(c => c.sousCategorie))];

                        return (
                          <div key={categorie} className="border rounded-xl overflow-hidden bg-white shadow-sm border-gray-200">
                            <h3 className="font-extrabold text-white bg-indigo-800 px-4 py-3 uppercase tracking-wider text-sm">
                              {categorie}
                            </h3>
                            
                            <div className="p-4 space-y-6 bg-gray-50/50">
                              {sousCategories.map(sousCat => {
                                const conceptsDuSousDomaine = conceptsDeCategorie.filter(c => c.sousCategorie === sousCat);
                                const isSousCatVisible = conceptsDuSousDomaine.some(c => getConceptStyle(c.anneesBleues, annee, cycle) !== "hidden");
                                
                                if (!isSousCatVisible) return null;

                                return (
                                  <div key={sousCat} className="border-l-4 border-indigo-400 pl-4 ml-1">
                                    <h4 className="font-bold text-indigo-900 bg-indigo-100 px-3 py-1.5 mb-3 rounded-r shadow-sm inline-block text-sm">
                                      {sousCat}
                                    </h4>
                                    <div className="space-y-1.5 mt-1">
                                      {conceptsDuSousDomaine.map(concept => {
                                        const styleClass = getConceptStyle(concept.anneesBleues, annee, cycle);
                                        if (styleClass === "hidden") return null;

                                        return (
                                          <label key={concept.id} className={`flex items-start space-x-3 cursor-pointer p-2 rounded-lg transition-colors border border-transparent hover:border-gray-200 bg-white ${styleClass}`}>
                                            <input 
                                              type="checkbox" 
                                              className="mt-1 w-5 h-5 text-indigo-600 rounded focus:ring-indigo-500 border-gray-300"
                                              checked={conceptsSelectionnes.includes(concept.id)}
                                              onChange={() => handleConceptToggle(concept.id)}
                                            />
                                            <span className="leading-snug pt-0.5 text-sm">{concept.texte}</span>
                                          </label>
                                        );
                                      })}
                                    </div>
                                  </div>
                                );
                              })}
                            </div>
                          </div>
                        );
                      })}
                    </div>

                    <div className="mt-6">
                      <label className="block text-sm font-bold text-gray-700 mb-2">Autres concepts (non listés) :</label>
                      <input 
                        type="text" 
                        placeholder="Tapez vos propres concepts mathématiques à intégrer ici..." 
                        className="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 bg-gray-50"
                        value={autresConcepts}
                        onChange={e => setAutresConcepts(e.target.value)}
                      />
                    </div>

                    <div className="mt-6 p-4 bg-red-50 rounded-lg border border-red-200">
                      <label className="flex items-center space-x-3 cursor-pointer text-red-800 font-bold">
                        <input type="checkbox" checked={exclureConceptsNonCoches} onChange={e => setExclureConceptsNonCoches(e.target.checked)} className="w-5 h-5 text-red-600 rounded border-red-300" />
                        <span>Contrainte stricte : Exclure systématiquement tous les concepts non cochés</span>
                      </label>
                    </div>
                  </>
                )}
              </section>

              {/* SECTION 4: VISUELS */}
              <section className="bg-white p-6 rounded-2xl shadow-sm border border-gray-200">
                <h2 className="text-xl font-bold text-indigo-900 mb-4 border-b pb-2">4. Supports visuels (SVG)</h2>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-3 mb-4">
                  {SUPPORTS_VISUELS.map(visuel => (
                    <label key={visuel} className="flex items-center space-x-3 cursor-pointer p-2 hover:bg-gray-50 rounded border border-transparent hover:border-gray-200">
                      <input type="checkbox" checked={visuelsSelectionnes.includes(visuel)} onChange={() => handleVisuelToggle(visuel)} className="w-5 h-5 text-indigo-600 rounded border-gray-300" />
                      <span className="text-gray-700">{visuel}</span>
                    </label>
                  ))}
                </div>
                <div className="p-4 bg-red-50 rounded-lg border border-red-200">
                  <label className="flex items-center space-x-3 cursor-pointer text-red-800 font-bold">
                    <input type="checkbox" checked={exclureVisuelsNonCoches} onChange={e => setExclureVisuelsNonCoches(e.target.checked)} className="w-5 h-5 text-red-600 rounded border-red-300" />
                    <span>Contrainte stricte : Exclure systématiquement les supports non cochés</span>
                  </label>
                </div>
              </section>

              {/* SECTION 5: DIFFÉRENCIATION */}
              <section className="bg-white p-6 rounded-2xl shadow-sm border border-gray-200">
                <h2 className="text-xl font-bold text-indigo-900 mb-4 border-b pb-2">5. Différenciation</h2>
                <select className="w-full p-3 border border-gray-300 rounded-lg focus:ring-indigo-500 bg-gray-50 mb-4" value={modeDifferenciation} onChange={e => setModeDifferenciation(e.target.value)}>
                  <option value="">Sélectionner une approche...</option>
                  <option value="Modifier le problème déposé en pièce jointe sans toucher au niveau de difficulté">Modifier une pièce jointe (Même niveau)</option>
                  <option value="Créer une nouvelle situation problème sans modèle">Créer sans modèle</option>
                  <option value="Reproduire exactement le même problème en changeant le niveau de difficulté">Reproduire en changeant la difficulté</option>
                </select>
                
                {modeDifferenciation === "Reproduire exactement le même problème en changeant le niveau de difficulté" && (
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-3 bg-indigo-50 p-4 rounded-lg border border-indigo-100">
                    {DIFFERENCIATIONS.map(diff => (
                      <label key={diff} className="flex items-center space-x-3 cursor-pointer">
                        <input type="checkbox" checked={diffSelectionnees.includes(diff)} onChange={() => handleDiffToggle(diff)} className="w-4 h-4 text-indigo-600 rounded border-gray-300" />
                        <span className="text-sm text-indigo-900">{diff}</span>
                      </label>
                    ))}
                  </div>
                )}
              </section>

              {/* SECTION 6: CONTEXTE ET STRUCTURE */}
              <section className="bg-white p-6 rounded-2xl shadow-sm border border-gray-200">
                <h2 className="text-xl font-bold text-indigo-900 mb-4 border-b pb-2">6. Contexte et Structure</h2>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                  
                  <div className="space-y-4">
                    <div>
                      <label className="block text-sm font-bold text-gray-700 mb-1">Lieu de l'action</label>
                      <select className="w-full p-3 border border-gray-300 rounded-lg bg-gray-50" value={lieu} onChange={e => setLieu(e.target.value)}>
                        <option value="">Sélectionner...</option>
                        {LIEUX.map(l => <option key={l} value={l}>{l}</option>)}
                      </select>
                      {lieu === "Autre" && <input type="text" placeholder="Précisez le lieu" className="mt-2 w-full p-3 border border-gray-300 rounded-lg" value={lieuAutre} onChange={e => setLieuAutre(e.target.value)} />}
                    </div>
                    <div>
                      <label className="block text-sm font-bold text-gray-700 mb-1">Thème narratif</label>
                      <select className="w-full p-3 border border-gray-300 rounded-lg bg-gray-50" value={theme} onChange={e => setTheme(e.target.value)}>
                        <option value="">Sélectionner...</option>
                        {THEMES.map(t => <option key={t} value={t}>{t}</option>)}
                      </select>
                      {theme === "Autre" && <input type="text" placeholder="Précisez le thème" className="mt-2 w-full p-3 border border-gray-300 rounded-lg" value={themeAutre} onChange={e => setThemeAutre(e.target.value)} />}
                    </div>
                    <div>
                      <label className="block text-sm font-bold text-gray-700 mb-1">Ton et Vocabulaire</label>
                      <select className="w-full p-3 border border-gray-300 rounded-lg bg-gray-50" value={ton} onChange={e => setTon(e.target.value)}>
                        <option value="">Sélectionner le niveau de vocabulaire...</option>
                        {TONS.map(t => <option key={t} value={t}>{t}</option>)}
                      </select>
                    </div>
                  </div>

                  <div className="space-y-4">
                    <div>
                      <label className="block text-sm font-bold text-gray-700 mb-1">Nombre d'étapes (implicites)</label>
                      <select className="w-full p-3 border border-gray-300 rounded-lg bg-gray-50" value={nbEtapes} onChange={e => setNbEtapes(e.target.value)}>
                        <option value="">Sélectionner...</option>
                        {[2,3,4,5,6,7].map(n => <option key={n} value={`${n} étapes`}>{n} étapes</option>)}
                        <option value="plus de 7 étapes">Plus de 7 étapes</option>
                      </select>
                    </div>
                    <div>
                      <label className="block text-sm font-bold text-gray-700 mb-1">Canevas de référence</label>
                      <select className="w-full p-3 border border-gray-300 rounded-lg bg-gray-50" value={modeleRef} onChange={e => setModeleRef(e.target.value)}>
                        <option value="">Sélectionner...</option>
                        <option value="Option 1 : mise en situation - Étapes du problème - Ta tâche consiste à…">Option 1 : Mise en situation ➔ Étapes ➔ Ta tâche consiste à</option>
                        <option value="Option 2 : mise en situation - Ta tâche consiste à… - Étapes du problème">Option 2 : Mise en situation ➔ Ta tâche consiste à ➔ Étapes</option>
                      </select>
                    </div>
                  </div>

                </div>
              </section>

              {/* BOUTON GÉNÉRER */}
              <div className="text-center pt-6 pb-12">
                <button 
                  onClick={genererPrompt}
                  className="bg-indigo-600 hover:bg-indigo-700 text-white px-8 py-4 rounded-xl font-bold text-xl shadow-lg transition-transform transform hover:scale-105"
                >
                  🚀 Générer la requête IA
                </button>
              </div>

              {/* RÉSULTAT */}
              {afficherResultat && (
                <section className="bg-gray-900 p-8 rounded-2xl shadow-2xl animate-fade-in border-t-8 border-green-500">
                  <div className="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
                    <h2 className="text-2xl font-bold text-white flex items-center">
                      <span className="bg-green-400 w-4 h-4 rounded-full mr-3 animate-pulse"></span>
                      Requête finale prête
                    </h2>
                    
                    {/* BOUTONS D'ACTION (COPIER / EFFACER) */}
                    <div className="flex flex-col md:flex-row gap-3 w-full md:w-auto mt-4 md:mt-0">
                      <button 
                        onClick={reinitialiserChoix}
                        className="bg-red-600 hover:bg-red-500 text-white px-5 py-3 rounded-lg font-bold shadow-lg transition-colors flex items-center justify-center"
                      >
                        <svg className="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                        Effacer tout
                      </button>
                      
                      <button 
                        onClick={copyToClipboard}
                        className="bg-green-600 hover:bg-green-500 text-white px-6 py-3 rounded-lg font-bold shadow-lg transition-colors flex items-center justify-center"
                      >
                        <svg className="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"></path></svg>
                        Copier la requête
                      </button>
                    </div>

                  </div>
                  <p className="text-gray-400 text-sm mb-4">
                    Collez ce texte exactement tel quel dans ChatGPT, Claude ou Gemini. Il contient toutes les directives strictes, les interdictions pédagogiques et vos paramètres.
                  </p>
                  <textarea 
                    className="w-full h-96 bg-gray-800 text-green-400 font-mono text-sm p-5 rounded-lg border border-gray-700 focus:outline-none focus:border-green-500 resize-y custom-scrollbar"
                    readOnly
                    value={promptGenere}
                  />
                </section>
              )}

            </main>
          </div>
        </div>
      );
    }

    // Montage de l'application React dans la page HTML
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<GenerateurSP />);
  </script>
</body>
</html>
